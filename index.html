<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slope-Intercept Explorer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Slope-Intercept Explorer</h1>
    <p class="subtitle">Drag the points, adjust sliders, edit the table &mdash; everything stays in sync. Scroll to zoom.</p>
  </header>

  <main>
    <section class="graph-panel">
      <canvas id="graph"></canvas>
    </section>

    <section class="controls-panel">
      <button id="btn-start-tutorial" class="btn btn-tutorial">Start Tutorial</button>
      <div class="card equation-card">
        <h2>Equation</h2>
        <div class="equation-grid">
          <span class="eq-cell">y</span>
          <span class="eq-cell">=</span>
          <span class="eq-cell eq-var-slot color-m">m</span>
          <span class="eq-cell">x</span>
          <span class="eq-cell">+</span>
          <span class="eq-cell eq-var-slot color-b">b</span>

          <span class="eq-cell">y</span>
          <span class="eq-cell">=</span>
          <div class="eq-cell eq-input-wrap eq-field-m">
            <input type="number" id="input-m" step="1" class="eq-input">
          </div>
          <span class="eq-cell">x</span>
          <span class="eq-cell">+</span>
          <div class="eq-cell eq-input-wrap eq-field-b">
            <input type="number" id="input-b" step="1" class="eq-input">
          </div>
        </div>
        <div class="equation-legend">
          <div class="legend-item">
            <span class="legend-swatch swatch-m"></span>
            <span><strong>m</strong> = <span id="legend-m-val">3</span> &mdash; rate of change (rise per run)</span>
          </div>
          <div class="legend-item">
            <span class="legend-swatch swatch-b"></span>
            <span><strong>b</strong> = <span id="legend-b-val">-4</span> &mdash; starting height (y-intercept)</span>
          </div>
        </div>
      </div>

      <div class="card sliders-card">
        <h2>Sliders</h2>
        <div class="slider-row">
          <label for="slider-m" class="slider-label-m">Slope (m)</label>
          <input type="range" id="slider-m" min="-10" max="10" step="1" class="slider-m">
          <span class="slider-value" id="slider-m-value">3</span>
        </div>
        <div class="slider-row">
          <label for="slider-b" class="slider-label-b">Intercept (b)</label>
          <input type="range" id="slider-b" min="-20" max="20" step="1" class="slider-b">
          <span class="slider-value" id="slider-b-value">-4</span>
        </div>
      </div>

      <div class="card aids-card">
        <h2>Learning Aids</h2>
        <label class="toggle-row">
          <input type="checkbox" id="toggle-triangle" checked>
          <span>Show rise / run triangle</span>
        </label>
        <label class="toggle-row">
          <input type="checkbox" id="toggle-steps" checked>
          <span>Show step points</span>
        </label>
        <label class="toggle-row">
          <input type="checkbox" id="toggle-snap" checked>
          <span>Snap to integers</span>
        </label>
      </div>

      <div class="card table-card">
        <h2>Data Table</h2>
        <table id="data-table">
          <thead>
            <tr><th>x</th><th>y</th><th></th></tr>
          </thead>
          <tbody></tbody>
        </table>
        <div class="table-actions">
          <button id="btn-add-row" class="btn">+ Add Row</button>
          <button id="btn-random" class="btn btn-accent">Random</button>
          <button id="btn-reset" class="btn btn-secondary">Reset</button>
        </div>
        <div class="table-fit-info" id="fit-info"></div>
      </div>
    </section>

    <section id="tutorial-panel" class="tutorial-panel" style="display:none">
      <div class="tutorial-header">
        <button id="tutorial-close" class="tutorial-close" title="Exit tutorial">&times;</button>
        <span id="tutorial-progress" class="tutorial-progress">1 / 9</span>
        <div class="tutorial-nav">
          <button id="tutorial-back" class="tutorial-nav-btn" title="Previous">&#8592;</button>
          <button id="tutorial-next" class="tutorial-nav-btn" title="Next">&#8594;</button>
        </div>
      </div>
      <div id="tutorial-formula" class="tutorial-formula"></div>
      <h3 id="tutorial-headline" class="tutorial-headline"></h3>
      <div id="tutorial-body" class="tutorial-body"></div>
      <div id="tutorial-controls" class="tutorial-controls-area"></div>
      <button id="tutorial-replay" class="btn btn-secondary tutorial-replay">Watch Again</button>
    </section>
  </main>

  <script defer src="js/app.js"></script>
</body>
</html>
