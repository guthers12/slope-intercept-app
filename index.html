<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slope-Intercept Explorer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Slope-Intercept Explorer</h1>
    <p class="subtitle">Drag the line, adjust sliders, edit the table &mdash; everything stays in sync.</p>
  </header>

  <main>
    <section class="graph-panel">
      <canvas id="graph"></canvas>
    </section>

    <section class="controls-panel">
      <div class="card equation-card">
        <h2>Equation</h2>
        <div class="equation-display">
          <span class="eq-label">y</span>
          <span class="eq-label">=</span>
          <input type="number" id="input-m" step="0.1" class="eq-input">
          <span class="eq-label">x</span>
          <span class="eq-label">+</span>
          <input type="number" id="input-b" step="0.5" class="eq-input">
        </div>
        <div class="equation-formatted" id="equation-text">y = 3x &minus; 4</div>
      </div>

      <div class="card sliders-card">
        <h2>Sliders</h2>
        <div class="slider-row">
          <label for="slider-m">Slope (m)</label>
          <input type="range" id="slider-m" min="-10" max="10" step="0.1">
          <span class="slider-value" id="slider-m-value">3</span>
        </div>
        <div class="slider-row">
          <label for="slider-b">Intercept (b)</label>
          <input type="range" id="slider-b" min="-20" max="20" step="0.5">
          <span class="slider-value" id="slider-b-value">-4</span>
        </div>
      </div>

      <div class="card table-card">
        <h2>Data Table</h2>
        <table id="data-table">
          <thead>
            <tr><th>x</th><th>y</th><th></th></tr>
          </thead>
          <tbody></tbody>
        </table>
        <div class="table-actions">
          <button id="btn-add-row" class="btn">+ Add Row</button>
          <button id="btn-reset" class="btn btn-secondary">Reset</button>
        </div>
        <div class="table-fit-info" id="fit-info"></div>
      </div>
    </section>
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
